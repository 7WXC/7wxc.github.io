- title: 'Towards Trajectory Anomaly Detection: A Fine-Grained and Noise-Resilient Framework'
  authors: <strong>Wei Shao</strong>, Ziquan Fang*, Lu Chen, Yunjun Gao
  venue: KDD 2025
  homepage: true
  venue_full: The 31st ACM SIGKDD Conference on Knowledge Discovery and Data Mining
  year: 2025
  type: Oral
  tags:
  - CCF-A
  - Conference
  framework_image: /assets/img/FOTraj.png
  paper: https://doi.org/10.1145/3711896.3737164
  code: https://github.com/ZJU-DAILY/FOTraj
  abstract: Trajectory anomaly detection aims to identify patterns in trajectory data that deviate significantly from normal behavior and plays a crucial role in urban computing. However, real-world trajectories contain diverse anomalies and unavoidable noise. Existing research mainly focuses on coarse-grained anomalies while paying limited attention to fine-grained anomalies and the impact of inherent noise. We propose FOTraj, an LLM-driven approach for fine-grained and noise-resilient trajectory anomaly detection. FOTraj introduces a Spatio-Temporal Dependency Encoder that converts raw trajectories into spatio-temporal graphs, a Patch-Gated Robustification module that simulates noisy environments, and a specialized graph decoder that maps language-model outputs back into graph structures. Extensive experiments on three datasets show that FOTraj outperforms state-of-the-art methods.
  bibtex: "@inproceedings{shao2025trajectory,\n  title={Towards Trajectory Anomaly Detection: A Fine-Grained and Noise-Resilient Framework},\n  author={Shao, Wei and Fang, Ziquan and Chen, Lu and Gao, Yunjun},\n  booktitle={Proceedings of the 31st ACM SIGKDD Conference on Knowledge Discovery and Data Mining},\n  pages={2490--2501},\n  year={2025},\n  doi={10.1145/3711896.3737164}\n}"
  keywords:
