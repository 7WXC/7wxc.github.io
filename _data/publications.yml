- title: 'SALT: Structural Transition-Aware Lossless Compression for Floating-Point Time Series Data Streams'
  authors: Zheqi Lu, Ziquan Fang*, <strong>Wei Shao</strong>, Yunjun Gao
  venue: SIGMOD 2027
  homepage: false
  venue_full: Under review
  year: 2027
  type: Under Review
  tags:
  - CCF-A
  - Conference
  framework_image: /assets/img/SALT.png
  code: https://anonymous.4open.science/r/SALT-0DC1
  abstract: The rapid growth of floating-point time-series data calls for efficient compression techniques to reduce storage costs. However, existing methods fail to fully exploit the structured nature of floating-point representations and the inherent periodicity in time-series data, leading to suboptimal compression performance, especially under structural changes such as exponent shifts. Moreover, they lack native support for efficient CRUD operations on compressed data, incurring substantial overhead due to full decompression. We first introduce a structured representation that explicitly decomposes floating-point values into sign, exponent, precision, and mantissa components, and design structural transitions that capture the evolution between consecutive representations. We then propose SALT, a structural transition-aware lossless compression framework that integrates cost-driven reference selection with an adaptive codebook to jointly model short-term transitions and long-term periodic patterns. We further develop SALT+, which enables efficient Create, Read, Update, and Delete operations over compressed data via a lightweight indexing structure without requiring full decompression. Experiments on 24 real-world datasets against eight state-of-the-art baselines demonstrate superior compression performance, strong robustness, and efficient compressed-state operations with low indexing overhead.
  keywords:
  - Floating-Point Time Series
  - Lossless Compression
  - Structural Transitions
  - Compressed-State CRUD
  venue_full_zh: Under review
  type_zh: 审稿中
  tags_zh:
  - CCF-A
  - 会议
  keywords_zh:
  - 浮点时间序列
  - 无损压缩
  - 结构转移
  - 压缩态增删改查
- title: 'REACT: A Lightweight Reliability-Aware Framework for Spatio-Temporal Out-of-Distribution Prediction'
  authors: Yongfeng Su, Ziquan Fang*, Jihua Yang, <strong>Wei Shao</strong>, Yunjun Gao
  venue: NeurIPS 2026
  homepage: false
  venue_full: Under review
  year: 2026
  type: Under Review
  tags:
  - CCF-A
  - Conference
  framework_image: /assets/img/REACT.png
  code: https://anonymous.4open.science/r/REACT-A82B
  abstract: In the real world, spatio-temporal forecasting systems inevitably encounter out-of-distribution shifts, where temporal shifts evolve due to seasonal patterns or policy changes, and spatial dependencies shift with sensor deployment, removal, or topology reconfiguration. Existing approaches implicitly assume that the contextual signals supporting prediction remain reliable, but node-level context can become biased or incomplete under temporal and spatial shifts, while fixed graph-based aggregation may amplify corrupted context across nodes. We propose REACT, a lightweight reliability-aware context-calibrated spatio-temporal forecaster that explicitly models and controls context reliability under out-of-distribution conditions. REACT establishes a topology-independent predictive anchor through a graph-free linear encoder, constructs availability-aware context from observed signals and prior-based imputations, and dynamically modulates spatial support through uncertainty-aware gating. Extensive experiments on ten real-world datasets with diverse temporal and structural shifts demonstrate that REACT consistently outperforms eleven baselines, highlighting context reliability as a fundamental principle for robust spatio-temporal forecasting under distribution shift.
  keywords:
  - Spatio-Temporal Forecasting
  - Out-of-Distribution Generalization
  - Context Reliability
  - Reliability-Aware Calibration
  venue_full_zh: Under review
  type_zh: 审稿中
  tags_zh:
  - CCF-A
  - 会议
  keywords_zh:
  - 时空预测
  - 分布外泛化
  - 上下文可靠性
