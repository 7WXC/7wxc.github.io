- title: 'SHoTClean: Bridging Soft and Hard Constraints for Multivariate Time Series Cleaning'
  authors: Ziquan Fang*, <strong>Wei Shao</strong>, Zheqi Lu, Lu Chen, Yunjun Gao
  venue: PACMMOD / SIGMOD 2026
  homepage: true
  venue_full: Proceedings of the ACM on Management of Data
  year: 2026
  type: Oral
  tags:
  - CCF-A
  - Conference
  framework_image: /assets/img/SHoTClean.png
  paper: https://doi.org/10.1145/3786698
  code: https://github.com/ZJU-DAILY/SHoTClean
  abstract: Time series data frequently suffer from data quality problems during collection and transmission, such as small-jump dirty points, which existing cleaning methods often fail to detect. Since existing methods primarily address univariate series, their multivariate extensions often fail to capture complex inter-variable dependencies, significantly limiting their effectiveness. To this end, we propose SHoTClean, a family of four algorithms that bridges hard constraints (i.e., physical limits) and soft constraints (i.e., statistical patterns) within a constrained-optimization framework for effective and efficient multivariate time series cleaning. We formulate the cleaning task as minimizing soft-constraint violations while respecting hard-constraint bounds, and develop specialized algorithms for offline batch processing, online streaming, accelerated online cleaning, and causal-enhanced multivariate cleaning. Extensive experiments across 12 real-world datasets demonstrate substantial improvements in accuracy, runtime, and robustness over state-of-the-art baselines.
  bibtex: "@article{fang2026shotclean,\n  title={SHoTClean: Bridging Soft and Hard Constraints for Multivariate Time Series Cleaning},\n  author={Fang, Ziquan and Shao, Wei and Lu, Zheqi and Chen, Lu and Gao, Yunjun},\n  journal={Proceedings of the ACM on Management of Data},\n  volume={4},\n  number={1},\n  pages={1--27},\n  year={2026},\n  doi={10.1145/3786698}\n}"
  keywords:
  - Time Series Cleaning
