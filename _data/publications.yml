- title: 'One Batch Is Enough: A Unified Dataset Condensation Framework for General Time Series Analysis'
  authors: <strong>Wei Shao</strong>, Ziquan Fang*, Zheqi Lu, Yongfeng Su, Yuzhu Wang, Yunjun Gao
  venue: ICML 2026
  homepage: true
  venue_full: The 43rd International Conference on Machine Learning
  year: 2026
  type: Poster
  tags:
  - CCF-A
  - Conference
  framework_image: /assets/img/UniTSC.png
  paper: https://icml.cc/virtual/2026/poster/62269
  code: https://github.com/ZJU-DAILY/UniTSC
  abstract: Time-series analysis is critical in real-world applications, yet the explosion of time-series data imposes severe burdens on storage and computational resources. Recently, dataset condensation has emerged as a promising data-centric solution by synthesizing compact yet informative datasets to replace large-scale raw data. However, existing methods are largely vision-centric, failing to capture unique temporal properties of time series, or task-specific, tightly coupling the condensed data to a particular downstream objective. As a result, these approaches suffer from feature mismatch and fail to generalize across diverse time-series tasks. To bridge this gap, we propose UniTSC, the first unified dataset condensation framework for general time-series analysis. UniTSC employs a multi-view hybrid encoder to capture task-invariant representations across temporal, spectral, and topological perspectives. Building upon this representation, we design a tri-space alignment paradigm that jointly aligns optimization trajectories, power spectral densities, and multivariate dependency structures, enabling comprehensive information preservation under extreme compression. Extensive experiments show that UniTSC retains up to 97.9% of downstream performance using as little as 0.01% of the original training data, revealing that a single batch-equivalent budget (less than 128 samples) is sufficient to capture the essential dynamics of complex time-series data.
  bibtex: "@inproceedings{shao2026one,\n  title={One Batch Is Enough: A Unified Dataset Condensation Framework for General Time Series Analysis},\n  author={Shao, Wei and Fang, Ziquan and Lu, Zheqi and Su, Yongfeng and Wang, Yuzhu and Gao, Yunjun},\n  booktitle={Proceedings of the 43rd International Conference on Machine Learning},\n  year={2026},\n  url={https://icml.cc/virtual/2026/poster/62269}\n}"
  keywords:
