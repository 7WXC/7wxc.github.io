- title: A Unified Federated Framework for Trajectory Data Preparation via LLMs
  authors: Zhihao Zeng, Ziquan Fang*, <strong>Wei Shao</strong>, Lu Chen, Yunjun Gao
  venue: ICLR 2026
  homepage: false
  venue_full: The Fourteenth International Conference on Learning Representations
  year: 2026
  type: Poster
  tags:
  - CCF-A
  - Conference
  framework_image: /assets/img/FedTDP.png
  paper: https://openreview.net/forum?id=MIelckWrEK
  code: https://github.com/ZJU-DAILY/FedTDP
  abstract: Trajectory data records the spatio-temporal movements of people and vehicles. However, raw trajectories are often noisy, incomplete, or inconsistent due to sensor errors and transmission failures. To ensure reliable downstream analytics, Trajectory Data Preparation (TDP) has emerged as a critical preprocessing stage, encompassing various tasks such as imputation, map matching, anomaly detection, trajectory recovery, and compression. Existing TDP methods assume centralized access to data and train task-specific models that lack generalization across diverse or unseen tasks. We propose FedTDP for Federated Trajectory Data Preparation, where trajectories are vertically partitioned across regions and cannot be directly shared. FedTDP combines a lightweight Trajectory Privacy AutoEncoder with secret-sharing aggregation, a Trajectory Knowledge Enhancer that adapts language models to spatio-temporal patterns, and Federated Parallel Optimization to reduce communication and training costs. Experiments on six real-world datasets and ten representative tasks show that FedTDP surpasses thirteen state-of-the-art baselines in accuracy, efficiency, and scalability while generalizing effectively across diverse tasks.
  bibtex: "@inproceedings{zeng2026a,\n  title={A Unified Federated Framework for Trajectory Data Preparation via {LLM}s},\n  author={Zeng, Zhihao and Fang, Ziquan and Shao, Wei and Chen, Lu and Gao, Yunjun},\n  booktitle={The Fourteenth International Conference on Learning Representations},\n  year={2026},\n  url={https://openreview.net/forum?id=MIelckWrEK}\n}"
  keywords:
  - Trajectory Data Preparation
  - Federated Learning
  - Large Language Models
  - Privacy Preservation
